name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @tms/shared build

      - name: Build API
        run: pnpm --filter @tms/api build

      - name: Build Web
        run: pnpm --filter @tms/web build

      - name: Run tests
        run: pnpm -r --if-present test

      - name: Validate Docker Compose (dev)
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate Docker Compose (prod)
        run: docker compose -f docker-compose.prod.yml config > /dev/null
        env:
          POSTGRES_DB: tms
          POSTGRES_USER: tms
          POSTGRES_PASSWORD: ci-test
          REDIS_PASSWORD: ci-test
          JWT_SECRET: ci-test-secret
